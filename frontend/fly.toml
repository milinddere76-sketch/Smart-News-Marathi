app = "snm-fe-priyansh"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  NEXT_PUBLIC_API_URL = "https://snm-be-priyansh.fly.dev"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
