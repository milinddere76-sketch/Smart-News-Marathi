services:
  # 1. Backend (FastAPI with Docker)
  - type: web
    name: smart-news-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: pro
    region: singapore
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: smart-news-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 8000
    disk:
      name: snm-media-storage
      mountPath: /app/media
      sizeGB: 10

  # 2. Redis (Internal for queue/cache)
  - type: redis
    name: smart-news-redis
    ipAllowList: []

  # 3. Frontend (Next.js with Docker)
  - type: web
    name: smart-news-frontend
    env: docker
    dockerContext: frontend
    dockerfilePath: Dockerfile
    region: singapore
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: smart-news-backend
          property: host

  # 4. Stream Engine (Background Worker with Docker)
  - type: worker
    name: smart-news-streamer
    env: docker
    dockerContext: stream-engine
    dockerfilePath: Dockerfile
    region: singapore
    envVars:
      - key: BACKEND_URL
        value: http://smart-news-backend:8000
      - key: YOUTUBE_STREAM_KEY
        sync: false
