services:
  # 1. PostgreSQL Database (Neon.tech is managed externally, but we define the connection)
  # 2. Backend (FastAPI)
  - type: web
    name: smart-news-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-news-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: smart-news-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
    networks:
      - name: smart-news-net

  # 3. Redis (Internal for queue/cache)
  - type: redis
    name: smart-news-redis
    ipAllowList: [] # Only allow internal traffic

  # 4. Frontend (Next.js)
  - type: web
    name: smart-news-frontend
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && node .next/standalone/server.js"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: smart-news-backend
          property: host
    networks:
      - name: smart-news-net

  # 5. Stream Engine (Background Worker)
  - type: worker
    name: smart-news-streamer
    env: python
    buildCommand: "cd stream-engine && pip install -r requirements.txt"
    startCommand: "python streamer.py"
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: smart-news-backend
          property: host
      - key: YOUTUBE_STREAM_KEY
        sync: false
